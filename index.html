<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>野場報隊系統</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Gemini_Generated_Image_fft0pnfft0pnfft0.png">
  <meta name="theme-color" content="#8B72BE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="野場報隊">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section id="landing-page">
    <div class="landing-container">
      <img src="Gemini_Generated_Image_fft0pnfft0pnfft0.png" class="landing-icon" alt="野場報隊">
      <h1 class="landing-title">野場報隊系統</h1>
      <p class="landing-desc">
        排球野場報名 × 即時計分<br>
        <span class="desc-pop">白貼紙 ㄅㄧㄤˋ！</span><br>
        報隊、計分，一手掌握
      </p>

      <div class="landing-install-card">
        <div class="landing-install-badge">⚠️ 使用前必讀</div>
        <p class="landing-install-heading">請先將此頁面加入主畫面</p>
        <p class="landing-install-sub">加入主畫面後從桌面開啟，才能正常使用報隊與計分功能。</p>

        <!-- iOS 步驟 -->
        <ol class="install-steps hidden" id="install-steps-ios">
          <li>點選下方 Safari 工具列的 <strong>分享</strong> 按鈕（方框加箭頭）</li>
          <li>往下滑找到 <strong>「加入主畫面」</strong></li>
          <li>點右上角 <strong>「新增」</strong></li>
          <li>從桌面開啟 <strong>野場報隊</strong> App</li>
        </ol>

        <!-- Android 步驟 -->
        <ol class="install-steps hidden" id="install-steps-android">
          <li>點選右上角 Chrome <strong>選單（⋮）</strong></li>
          <li>選擇 <strong>「新增至主畫面」</strong> 或 <strong>「安裝應用程式」</strong></li>
          <li>點 <strong>「新增」</strong> 確認</li>
          <li>從桌面開啟 <strong>野場報隊</strong> App</li>
        </ol>

        <!-- Android Chrome 原生安裝按鈕 -->
        <button id="install-btn" class="landing-install-btn hidden" type="button">
          安裝 App 到主畫面
        </button>

        <a href="app.html" class="landing-enter-btn">
          我已加入主畫面，進入 App →
        </a>
      </div>
    </div>
  </section>

  <script>
    let deferredInstallPrompt = null;
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      document.getElementById("install-btn").classList.remove("hidden");
    });

    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
    document.getElementById("install-steps-ios").classList.toggle("hidden", !isIOS);
    document.getElementById("install-steps-android").classList.toggle("hidden", isIOS);

    document.getElementById("install-btn").addEventListener("click", async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      document.getElementById("install-btn").classList.add("hidden");
    });
  </script>
</body>
</html>
