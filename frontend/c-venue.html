<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>C球館 | 野場喊PLAY！</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="app-icon.png">
  <meta name="theme-color" content="#8B72BE">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .cv-wrap {
      text-align: center;
      max-width: 720px;
    }
    .cv-back {
      position: fixed;
      top: 16px;
      left: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: var(--purple-dark);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 14px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .cv-msg {
      font-size: clamp(40px, 10vw, 96px);
      font-weight: 900;
      letter-spacing: 4px;
      line-height: 1.2;
      color: var(--purple-deep);
      text-shadow: 0 6px 20px rgba(74, 45, 140, 0.25);
      margin: 0;
    }
  </style>
</head>
<body>
  <a href="private-venues.html" class="cv-back">← 返回</a>
