<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>線上打排球</title>
  <style>
    :root {
      --purple:      #9B7FD4;
      --purple-dark: #6B4FAF;
      --purple-deep: #4A2D8C;
      --teal:        #3ECFC4;
      --teal-deep:   #0D7A73;
      --gold:        #F5C842;
      --text:        #1A1035;
      --text-muted:  #5A5070;
      --border:      rgba(155,127,212,0.25);
      --card-bg:     rgba(255,255,255,0.78);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(139,100,220,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 75%, rgba(62,207,196,0.18) 0%, transparent 55%),
        linear-gradient(160deg, #F5F2FF 0%, #EBF9F8 100%);
      min-height: 100vh;
      color: var(--text);
    }

    .page { display: flex; flex-direction: column; align-items: center; padding: 48px 20px 40px; min-height: 100vh; }
    .page.hidden { display: none; }

    .back-link {
      align-self: flex-start;
      color: var(--purple-dark);
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 28px;
    }
    .back-link:hover { color: var(--purple-deep); }

    h1 {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--purple-deep) 0%, var(--teal-deep) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 36px;
      text-align: center;
    }

    .lobby-btns { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 320px; }

    .lobby-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px 24px;
      border-radius: 18px;
      font-size: 1.1rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: transform 0.13s, box-shadow 0.13s;
      touch-action: manipulation;
    }

    .play-btn {
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-deep) 100%);
      color: #fff;
      box-shadow: 0 6px 22px rgba(107,79,175,0.38);
    }

    .lb-btn {
      background: var(--card-bg);
      color: var(--purple-deep);
      border: 1.5px solid var(--border);
      box-shadow: 0 4px 14px rgba(107,79,175,0.1);
    }

    .lobby-btn:hover, .lobby-btn:active { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(107,79,175,0.28); }

    /* ── Leaderboard page ── */
    h2 {
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--purple-deep) 0%, var(--teal-deep) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
      text-align: center;
    }

    .lb-table-wrap {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border-radius: 16px;
      border: 1.5px solid rgba(255,255,255,0.55);
      box-shadow: 0 4px 22px rgba(107,79,175,0.1);
      overflow: hidden;
      margin-bottom: 20px;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: linear-gradient(90deg, var(--purple-deep) 0%, #2a1b6a 100%); color: #fff; }
    thead th { padding: 12px 14px; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px; text-align: left; }
    thead th:last-child { text-align: right; }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(odd) { background: rgba(155,127,212,0.04); }

    td { padding: 11px 14px; font-size: 0.9rem; color: var(--text); }
    td:last-child { text-align: right; font-weight: 700; color: var(--purple-dark); }

    .rank-medal { font-size: 1.1rem; }

    .empty-lb { text-align: center; padding: 32px; color: var(--text-muted); font-size: 0.95rem; }

    .lb-actions { display: flex; gap: 12px; margin-top: 4px; }

    .btn-back {
      padding: 11px 22px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--purple-deep);
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-clear {
      padding: 11px 22px;
      border-radius: 12px;
      border: none;
      background: rgba(224,82,82,0.1);
      color: #C03A3A;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Lobby page -->
  <div class="page" id="lobby-page">
    <a href="../app.html" class="back-link">← 返回主頁</a>
    <h1>🏐 線上打排球</h1>
    <div class="lobby-btns">
      <a href="volleyball-game.html" class="lobby-btn play-btn">🎮 開始遊戲</a>
      <button class="lobby-btn lb-btn" id="show-lb-btn">🏆 排行榜</button>
    </div>
  </div>

  <!-- Leaderboard page -->
  <div class="page hidden" id="lb-page">
    <button class="back-link" id="back-to-lobby-btn" style="background:none;border:none;cursor:pointer;">← 返回</button>
    <h2>🏆 排行榜</h2>
    <div class="lb-table-wrap">
      <table>
        <thead>
          <tr>
            <th>名次</th>
            <th>名字</th>
            <th>日期</th>
            <th>分數</th>
          </tr>
        </thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>
    <div class="lb-actions">
      <button class="btn-back" id="lb-back-btn">← 返回</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="../firebase-db.js"></script>
  <script>
    const LB_KEY = 'pikachu-leaderboard';
    const MEDALS = ['🥇','🥈','🥉'];
    let boardData = [];
    let unsubLb = null;

    function getLocalBoard() {
      try { return JSON.parse(localStorage.getItem(LB_KEY) || '[]'); } catch(_e) { return []; }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderBoard() {
      const tbody = document.getElementById('lb-body');
      if (boardData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-lb">尚無紀錄</td></tr>';
        return;
      }
      tbody.innerHTML = boardData.map((r, i) =>
        `<tr>
          <td><span class="rank-medal">${MEDALS[i] || (i+1)}</span></td>
          <td>${escHtml(r.name)}</td>
          <td>${escHtml(r.date)}</td>
          <td>${r.score}</td>
        </tr>`
      ).join('');
    }

    function showLeaderboard() {
      document.getElementById('lobby-page').classList.add('hidden');
      document.getElementById('lb-page').classList.remove('hidden');
      if (window.FirebaseAppReady && window.FirebaseDB) {
        window.FirebaseAppReady.then(() => {
          if (unsubLb) unsubLb();
          unsubLb = window.FirebaseDB.subscribeLeaderboard(
            (docs) => { boardData = docs; renderBoard(); },
            () => { boardData = getLocalBoard(); renderBoard(); }
          );
        });
      } else {
        boardData = getLocalBoard();
        renderBoard();
      }
    }

    function backToLobby() {
      if (unsubLb) { unsubLb(); unsubLb = null; }
      document.getElementById('lb-page').classList.add('hidden');
      document.getElementById('lobby-page').classList.remove('hidden');
    }

    document.getElementById('show-lb-btn').addEventListener('click', showLeaderboard);
    document.getElementById('back-to-lobby-btn').addEventListener('click', backToLobby);
    document.getElementById('lb-back-btn').addEventListener('click', backToLobby);
  </script>
</body>
</html>
