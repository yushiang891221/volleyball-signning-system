<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>野場報隊系統</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Gemini_Generated_Image_fft0pnfft0pnfft0.png">
  <meta name="theme-color" content="#8B72BE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="野場報隊">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hamburger toggle (hidden until venue is selected) -->
  <button id="nav-toggle" type="button" aria-label="開啟選單" style="display:none">☰</button>
  <!-- Overlay -->
  <div id="nav-overlay"></div>
  <!-- Side drawer -->
  <nav id="side-drawer">
    <div id="drawer-header">
      <span>野場報隊</span>
      <button id="nav-close" type="button" aria-label="關閉">✕</button>
    </div>
    <div id="venue-badge">
      <div id="venue-badge-info">
        <span id="venue-badge-label" class="venue-badge-label">目前球場</span>
        <span id="venue-badge-name"></span>
      </div>
      <button id="change-venue-btn" type="button">換球場</button>
    </div>
    <ul id="drawer-nav">
      <li class="nav-venue-section-label">球場功能</li>
      <li><button id="go-registration" type="button"><img src="contract.png" class="nav-icon" alt="">報名頁面</button></li>
      <li><button id="go-score" type="button"><img src="score.png" class="nav-icon" alt="">計分頁面</button></li>
      <li><button id="go-admin" type="button"><img src="setting.png" class="nav-icon" alt="">管理員頁面</button></li>
      <li class="nav-divider-item"></li>
      <li><a href="pikachu/volleyball-game.html" id="go-game">🏐 線上打排球</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1>野場報隊系統</h1>
    <p id="current-time" class="time-bar"></p>

    <!-- ── Venue selection landing page ── -->
    <section id="venue-page">
      <!-- Top-level: pick venue -->
      <div id="venue-top-select">
        <p class="venue-page-subtitle">請選擇球場</p>
        <div class="venue-cards">
          <button class="venue-card" id="select-fengchia">
            <div class="venue-card-icon">🏟</div>
            <div class="venue-card-name">逢甲大學球場</div>
          </button>
          <button class="venue-card" id="select-home">
            <div class="venue-card-icon">🏠</div>
            <div class="venue-card-name">測試用球場</div>
          </button>
        </div>
      </div>

      <!-- Court selection: shown after picking 逢甲 -->
      <div id="court-select" class="hidden">
        <div class="court-select-header">
          <button id="back-to-venues" type="button" class="back-btn">← 返回</button>
          <p class="venue-page-subtitle">逢甲大學球場</p>
          <p class="venue-page-hint">請選擇場地</p>
        </div>
        <div class="venue-cards">
          <button class="venue-card" id="select-fengchia-1">
            <div class="venue-card-icon">①</div>
            <div class="venue-card-name">場地一</div>
          </button>
          <button class="venue-card" id="select-fengchia-2">
            <div class="venue-card-icon">②</div>
            <div class="venue-card-name">場地二</div>
          </button>
        </div>
      </div>
    </section>

    <section id="registration-page" class="hidden">
      <section class="registration-section">
        <h2>單隊報名（每隊 6 人）</h2>
        <div class="registration-card hidden">
          <label for="venue-select">選擇球場</label>
          <select id="venue-select">
            <option value="fengchia_1">逢甲大學球場 場地一</option>
            <option value="fengchia_2">逢甲大學球場 場地二</option>
            <option value="home">測試用球場</option>
          </select>
        </div>
        <div class="registration-card">
          <label for="team-name">隊名</label>
          <input id="team-name" type="text" placeholder="例如：北一隊">
          <div class="player-inputs" id="team-inputs">
            <input type="text" placeholder="第 1 位球員姓名">
            <input type="text" placeholder="第 2 位球員姓名">
            <input type="text" placeholder="第 3 位球員姓名">
            <input type="text" placeholder="第 4 位球員姓名">
            <input type="text" placeholder="第 5 位球員姓名">
            <input type="text" placeholder="第 6 位球員姓名">
          </div>
        </div>

        <div class="favorite-card registration-card">
          <label>常用隊伍</label>
          <div class="favorite-row">
            <select id="favorite-select">
              <option value="">── 選擇常用隊伍 ──</option>
            </select>
            <button id="apply-favorite-btn" type="button">套用</button>
            <button id="delete-favorite-btn" class="danger-btn" type="button">刪除</button>
          </div>
          <button id="save-favorite-btn" type="button" class="save-fav-btn">＋ 儲存目前填寫為常用隊伍</button>
        </div>

        <p id="location-message"></p>
        <div class="management-grid">
          <section class="panel-block">
            <h3>報名隊伍管理</h3>
            <div class="panel-actions">
              <button id="register-team" type="button">報名這一隊</button>
              <button id="cancel-my-registration" class="danger-btn" type="button">取消我的報名</button>
              <button id="quick-start" type="button">⚡ 快速開局</button>
            </div>
            <ol id="registered-teams"></ol>
            <h4>報名隊名紀錄</h4>
            <ol id="registration-history"></ol>
          </section>

          <section class="panel-block">
            <h3>比賽結果管理</h3>
            <ol id="match-history"></ol>
          </section>
        </div>
        <p id="registration-message"></p>
      </section>
    </section>

    <section id="score-page" class="hidden">
      <p id="score-page-message" class="score-page-message">請先到報名頁面完成兩隊報名。</p>

      <section class="scoreboard hidden" id="game-section">
        <article class="team-card" id="team-a-card">
          <h2 id="team-a-title">隊伍 A</h2>
          <p class="score" id="score-a">0</p>
          <div class="controls">
            <button id="a-plus" type="button">+1</button>
            <button id="a-minus" type="button">-1</button>
          </div>
          <ol id="team-a-players" class="player-list"></ol>
        </article>

        <article class="team-card" id="team-b-card">
          <h2 id="team-b-title">隊伍 B</h2>
          <p class="score" id="score-b">0</p>
          <div class="controls">
            <button id="b-plus" type="button">+1</button>
            <button id="b-minus" type="button">-1</button>
          </div>
          <ol id="team-b-players" class="player-list"></ol>
        </article>
      </section>

      <section class="status-section hidden" id="status-section">
        <p id="status">比賽進行中</p>
        <p id="scorer-status"></p>
      </section>
    </section>

    <section id="admin-page" class="hidden">
      <section class="registration-section">
        <h2>管理員頁面</h2>
        <section id="admin-login-section" class="panel-block">
          <h3>管理員登入</h3>
          <label for="admin-password">密碼</label>
          <input id="admin-password" type="password" placeholder="輸入管理員密碼">
          <div class="panel-actions">
            <button id="admin-unlock" type="button">進入管理員模式</button>
          </div>
          <p id="admin-auth-message"></p>
        </section>

        <section id="admin-controls-section" class="panel-block hidden">
          <h3>系統控制</h3>
          <p id="location-check-status"></p>
          <p id="streak-mode-status"></p>
          <div class="panel-actions">
            <button id="toggle-location-check" class="danger-btn" type="button">切換定位檢查</button>
            <button id="toggle-streak-mode" class="danger-btn" type="button">切換連二下模式</button>
            <button id="reset-registration" class="danger-btn" type="button">重置報名隊伍</button>
            <button id="reset-match-history" class="danger-btn" type="button">重置比賽結果</button>
          </div>
          <h4>強制刪除隊伍</h4>
          <ul id="admin-team-list" class="admin-team-list"></ul>
        </section>
      </section>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebase-db.js"></script>
  <script src="app.js"></script>
</body>
</html>
